name: CI/CD for pipeline

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"] 

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0
      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  unit-tests:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
         php-version: '8.4' 
         extensions: mbstring, mysqli

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Run Unit Tests
        run:  vendor/bin/phpunit tests/AuthServiceTest.php
  build-and-push:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/complain-app:latest
            ${{ secrets.DOCKER_USERNAME }}/complain-app:${{ github.sha }}
  staging-deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/home/ubuntu/"
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: DB_PASSWORD,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            cd /home/ubuntu/
            # 1. Khởi tạo file .env cho code của Thư
            echo "DB_HOST=db" > .env
            echo "DB_NAME=login_api_demo" >> .env
            echo "DB_USER=root" >> .env
            echo "DB_PASS=$DB_PASSWORD" >> .env
            # 2. Đăng nhập Docker Hub ngay trên EC2
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            
            # 3. Pull Image mới nhất và khởi động lại
            docker-compose pull
            docker-compose up -d
            # 4. Dọn dẹp Image cũ để không đầy ổ cứng 
            docker image prune -f