name: CI/CD for pipeline

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"] 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/complain-app:latest
            ${{ secrets.DOCKER_USERNAME }}/complain-app:${{ github.sha }}