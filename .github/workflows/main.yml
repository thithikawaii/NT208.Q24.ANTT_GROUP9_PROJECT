name: CI/CD for pipeline

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"] 

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0
      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  unit-tests:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
         php-version: '8.4' 
         extensions: mbstring, mysqli

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Run Unit Tests
        run:  vendor/bin/phpunit tests/AuthServiceTest.php
  build-and-push:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/complain-app:latest
            ${{ secrets.DOCKER_USERNAME }}/complain-app:${{ github.sha }}
  staging-deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/home/ubuntu/"
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: DB_PASSWORD,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            cd /home/ubuntu
            echo "1. Creating .env file with database credentials and image tag..."
            echo "DB_HOST=db" > .env
            echo "DB_USER=root" >> .env
            echo "DB_PASS=${DB_PASSWORD}" >> .env
            echo "DB_NAME=login_api_demo" >> .env
            echo "IMAGE_TAG=${{github.sha}}" >> .env
            echo "DOCKER_USERNAME=${DOCKER_USERNAME}" >> .env 
            echo "2. Logging in and pulling the latest image..."
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin 
            docker-compose pull
            docker-compose up -d 
            echo "3. Running smoke tests..."
            sleep 15
            if curl -s -f http://localhost > /dev/null; then
            echo "Smoke test passed!"
            else  
            echo "Smoke test failed!"
            sed -i "s/IMAGE_TAG=.*/IMAGE_TAG=${{ github.event.before }}/g" .env
            docker-compose pull
            docker-compose up -d
            echo "Rolled back to previous image."
            exit 1
            fi
            docker image prune -f