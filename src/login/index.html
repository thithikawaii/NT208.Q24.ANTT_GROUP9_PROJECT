<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-shell">
        <div class="box">
            <h1>Dang nhap</h1>
            <p class="subtitle">Quan ly task co ban cho do an CI/CD.</p>

            <input type="text" id="loginUsername" placeholder="Nhap ten dang nhap">
            <input type="password" id="loginPassword" placeholder="Nhap mat khau">
            <button type="button" onclick="login()">Dang nhap</button>

            <p id="loginMessage" class="message"></p>
            <a href="register.html">Chua co tai khoan? Dang ky</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
