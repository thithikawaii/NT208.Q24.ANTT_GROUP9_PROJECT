<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-shell">
        <div class="box">
            <h1>Đăng ký</h1>
            <p class="subtitle">Mật khẩu phải có ít nhất 8 ký tự, chữ hoa, chữ thường, số và ký tự đặc biệt.</p>

            <input type="text" id="registerUsername" placeholder="Nhập tên đăng nhập">
            <input type="email" id="registerEmail" placeholder="Nhập email">
            <input type="password" id="registerPassword" placeholder="Nhập mật khẩu">
            <input type="password" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu">

            <button type="button" onclick="register()">Đăng ký</button>

            <p id="registerMessage" class="message"></p>
            <a href="login.html">Đã có tài khoản? Đăng nhập</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
