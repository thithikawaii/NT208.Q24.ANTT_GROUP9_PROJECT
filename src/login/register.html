<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <h2>Đăng ký</h2>

        <input type="text" id="registerUsername" placeholder="Nhập tên đăng nhập">
        <input type="email" id="registerEmail" placeholder="Nhập email">
        <input type="password" id="registerPassword" placeholder="Nhập mật khẩu">
        <input type="password" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu">
    
        <button onclick="register()">Đăng ký</button>

        <p id="registerMessage"></p>
        <a href="index.html">Đã có tài khoản? Đăng nhập</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
